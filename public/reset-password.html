<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vallor Tracking PRO — Redefinir Senha</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #C9A84C;
    --gold-light: #E8C97A;
    --gold-dim: #8A6F2E;
    --black: #0A0A0A;
    --dark: #111111;
    --card: #161616;
    --border: rgba(201,168,76,0.2);
    --text: #F0EDE8;
    --muted: #7A7570;
  }

  body {
    font-family: 'Montserrat', sans-serif;
    background: var(--black);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 50%, rgba(201,168,76,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 40% 60% at 80% 20%, rgba(201,168,76,0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(201,168,76,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(201,168,76,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 440px;
    padding: 20px;
    animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .logo-wrap {
    text-align: center;
    margin-bottom: 40px;
  }

  .logo-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 56px;
    height: 56px;
    border: 1px solid var(--border);
    border-radius: 14px;
    margin-bottom: 16px;
    position: relative;
    background: rgba(201,168,76,0.05);
  }

  .logo-icon::before {
    content: 'V';
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 600;
    color: var(--gold);
    line-height: 1;
  }

  .logo-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 300;
    letter-spacing: 0.12em;
    color: var(--text);
  }

  .logo-name span { color: var(--gold); font-weight: 600; }

  .logo-sub {
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 4px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px 36px;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
  }

  .card-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 400;
    color: var(--text);
    margin-bottom: 4px;
  }

  .card-sub {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 32px;
    letter-spacing: 0.02em;
  }

  .field { margin-bottom: 20px; }

  label {
    display: block;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .input-wrap { position: relative; }

  input[type="password"],
  input[type="text"] {
    width: 100%;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 14px 46px 14px 16px;
    font-family: 'Montserrat', sans-serif;
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: border-color 0.3s, background 0.3s, box-shadow 0.3s;
  }

  input:focus {
    border-color: var(--gold-dim);
    background: rgba(201,168,76,0.04);
    box-shadow: 0 0 0 3px rgba(201,168,76,0.08);
  }

  input.error {
    border-color: #C0392B;
    box-shadow: 0 0 0 3px rgba(192,57,43,0.1);
  }

  .toggle-pw {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    padding: 4px;
    display: flex;
    align-items: center;
    transition: color 0.2s;
  }

  .toggle-pw:hover { color: var(--gold); }
  .toggle-pw svg { width: 18px; height: 18px; }

  /* Strength bar */
  .strength-bar {
    margin-top: 8px;
    height: 3px;
    border-radius: 2px;
    background: rgba(255,255,255,0.06);
    overflow: hidden;
  }

  .strength-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.3s, background 0.3s;
    width: 0%;
  }

  .msg-box {
    font-size: 11px;
    margin-top: 6px;
    display: none;
    padding: 8px;
    border-radius: 6px;
  }
  .msg-box.err { color: #E74C3C; display: block; animation: shake 0.3s ease; }
  .msg-box.ok  { color: var(--gold); display: block; }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-4px); }
    75% { transform: translateX(4px); }
  }

  .btn-reset {
    width: 100%;
    margin-top: 8px;
    background: linear-gradient(135deg, var(--gold-dim) 0%, var(--gold) 50%, var(--gold-light) 100%);
    border: none;
    border-radius: 10px;
    padding: 15px;
    font-family: 'Montserrat', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #0A0A0A;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.3s, opacity 0.3s;
    box-shadow: 0 4px 24px rgba(201,168,76,0.25);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .btn-reset:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 32px rgba(201,168,76,0.35);
  }

  .btn-reset:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

  .spinner {
    display: none;
    width: 16px;
    height: 16px;
    border: 2px solid rgba(0,0,0,0.3);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }

  .btn-reset.loading .btn-text { display: none; }
  .btn-reset.loading .spinner { display: block; }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Success overlay */
  .success-overlay {
    display: none;
    position: absolute;
    inset: 0;
    background: var(--card);
    border-radius: 20px;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    animation: fadeIn 0.4s ease;
    z-index: 10;
    text-align: center;
    padding: 40px;
  }

  .success-overlay.show { display: flex; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .success-icon {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    border: 2px solid var(--gold);
    display: flex;
    align-items: center;
    justify-content: center;
    animation: scaleIn 0.4s 0.1s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }

  @keyframes scaleIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  .success-icon svg { color: var(--gold); width: 30px; height: 30px; }
  .success-text { font-family: 'Cormorant Garamond', serif; font-size: 22px; color: var(--text); }
  .success-sub { font-size: 12px; color: var(--muted); margin-top: -8px; }

  /* Token inválido */
  .invalid-box {
    display: none;
    text-align: center;
    padding: 32px 0;
  }
  .invalid-box.show { display: block; }
  .invalid-icon { font-size: 40px; margin-bottom: 16px; }
  .invalid-text { font-family: 'Cormorant Garamond', serif; font-size: 20px; color: var(--text); margin-bottom: 8px; }
  .invalid-sub { font-size: 12px; color: var(--muted); }
  .btn-back {
    display: inline-block;
    margin-top: 20px;
    padding: 10px 24px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gold);
    text-decoration: none;
    transition: background 0.2s, border-color 0.2s;
  }
  .btn-back:hover { background: rgba(201,168,76,0.08); border-color: var(--gold); }

  .footer {
    text-align: center;
    margin-top: 28px;
    font-size: 11px;
    color: rgba(122,117,112,0.5);
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>

<div class="container">
  <div class="logo-wrap">
    <div class="logo-icon"></div>
    <div class="logo-name">VALLOR <span>TRACKING</span></div>
    <div class="logo-sub">Pro Dashboard</div>
  </div>

  <div class="card">
    <!-- Overlay de sucesso -->
    <div class="success-overlay" id="successOverlay">
      <div class="success-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <div class="success-text">Senha alterada!</div>
      <div class="success-sub">Redirecionando para o login...</div>
    </div>

    <!-- Token inválido / expirado -->
    <div class="invalid-box" id="invalidBox">
      <div class="invalid-icon">🔐</div>
      <div class="invalid-text">Link inválido ou expirado</div>
      <div class="invalid-sub">Solicite um novo link de redefinição de senha.</div>
      <a href="/login" class="btn-back">Voltar ao Login</a>
    </div>

    <!-- Formulário de reset -->
    <div id="resetForm">
      <div class="card-title">Redefinir Senha</div>
      <div class="card-sub">Crie uma nova senha para sua conta</div>

      <div class="field">
        <label for="newPassword">Nova Senha</label>
        <div class="input-wrap">
          <input type="password" id="newPassword" placeholder="••••••••" autocomplete="new-password">
          <button class="toggle-pw" id="togglePw1" type="button" aria-label="Mostrar senha">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
        <div class="msg-box" id="pwErr"></div>
      </div>

      <div class="field">
        <label for="confirmPassword">Confirmar Senha</label>
        <div class="input-wrap">
          <input type="password" id="confirmPassword" placeholder="••••••••" autocomplete="new-password">
          <button class="toggle-pw" id="togglePw2" type="button" aria-label="Mostrar confirmação">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <div class="msg-box" id="confirmErr"></div>
      </div>

      <button class="btn-reset" id="btnReset" type="button">
        <span class="btn-text">Salvar Nova Senha</span>
        <div class="spinner"></div>
      </button>
    </div>
  </div>

  <div class="footer">© 2026 Vallor Tracking PRO · Grupo Vallor</div>
</div>

<script>
async function initReset() {
  try {
    // Busca credenciais Supabase do backend
    const cfgRes = await fetch('/api/config');
    const { supabaseUrl, supabaseKey } = await cfgRes.json();
    const { createClient } = window.supabase;
    const client = createClient(supabaseUrl, supabaseKey);

    // Extrai token do hash da URL: #access_token=xxx&type=recovery
    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);
    const accessToken = params.get('access_token');
    const type = params.get('type');

    const resetForm  = document.getElementById('resetForm');
    const invalidBox = document.getElementById('invalidBox');
    const overlay    = document.getElementById('successOverlay');

    // Se não tem token ou não é do tipo recovery, mostra erro
    if (!accessToken || type !== 'recovery') {
      resetForm.style.display  = 'none';
      invalidBox.classList.add('show');
      return;
    }

    // Define a sessão com o token de recuperação
    const { error: sessionError } = await client.auth.setSession({
      access_token:  accessToken,
      refresh_token: params.get('refresh_token') || ''
    });

    if (sessionError) {
      resetForm.style.display = 'none';
      invalidBox.classList.add('show');
      return;
    }

    // ── Barra de força da senha ────────────────────────────────
    const pwInput    = document.getElementById('newPassword');
    const strengthFill = document.getElementById('strengthFill');

    pwInput.addEventListener('input', () => {
      const val = pwInput.value;
      let score = 0;
      if (val.length >= 8) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;

      const pct   = (score / 4) * 100;
      const color = score <= 1 ? '#E74C3C' : score === 2 ? '#F39C12' : score === 3 ? '#2ECC71' : '#27AE60';
      strengthFill.style.width      = pct + '%';
      strengthFill.style.background = color;
    });

    // ── Toggle mostrar/ocultar senha ──────────────────────────
    function setupToggle(btnId, inputId) {
      document.getElementById(btnId).addEventListener('click', () => {
        const inp = document.getElementById(inputId);
        inp.type  = inp.type === 'password' ? 'text' : 'password';
      });
    }
    setupToggle('togglePw1', 'newPassword');
    setupToggle('togglePw2', 'confirmPassword');

    // ── Botão salvar ───────────────────────────────────────────
    document.getElementById('btnReset').addEventListener('click', async () => {
      const pwErr      = document.getElementById('pwErr');
      const confirmErr = document.getElementById('confirmErr');
      const btn        = document.getElementById('btnReset');

      pwErr.textContent = '';
      pwErr.className   = 'msg-box';
      confirmErr.textContent = '';
      confirmErr.className   = 'msg-box';

      const newPw     = document.getElementById('newPassword').value;
      const confirmPw = document.getElementById('confirmPassword').value;

      if (!newPw || newPw.length < 6) {
        pwErr.textContent = 'A senha deve ter no mínimo 6 caracteres.';
        pwErr.classList.add('err');
        return;
      }

      if (newPw !== confirmPw) {
        confirmErr.textContent = 'As senhas não coincidem.';
        confirmErr.classList.add('err');
        return;
      }

      btn.classList.add('loading');
      btn.disabled = true;

      const { error } = await client.auth.updateUser({ password: newPw });

      if (error) {
        pwErr.textContent = 'Erro: ' + error.message;
        pwErr.classList.add('err');
        btn.classList.remove('loading');
        btn.disabled = false;
      } else {
        overlay.classList.add('show');
        setTimeout(() => { window.location.href = '/login'; }, 2000);
      }
    });

  } catch (err) {
    console.error('Erro ao inicializar reset:', err);
    document.getElementById('resetForm').style.display = 'none';
    document.getElementById('invalidBox').classList.add('show');
  }
}

document.addEventListener('DOMContentLoaded', initReset);
</script>
</body>
</html>
