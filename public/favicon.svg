<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F0B429;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#C8960C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8A6F2E;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10" />
      <feOffset dx="0" dy="5" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.5" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect x="25" y="25" width="462" height="462" rx="110" fill="#0A0A0A" />
  
  <!-- Border with Gradient -->
  <rect x="25" y="25" width="462" height="462" rx="110" fill="none" stroke="url(#goldGrad)" stroke-width="20" />
  
  <!-- Letter V -->
  <text x="50%" y="335" 
        text-anchor="middle" 
        font-family="'Cormorant Garamond', serif" 
        font-size="280" 
        font-weight="600" 
        fill="url(#goldGrad)"
        style="filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.5));">V</text>
</svg>
